{{/* Mirror PaperMod's `html.dark` class onto `data-theme="dark"` so the
     redesign tokens (which listen to data-theme) flip in lockstep with
     PaperMod's toggle. Runs synchronously to avoid a flash. */}}
<script>
(function () {
    function sync() {
        var dark = document.documentElement.classList.contains('dark');
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    }
    sync();
    new MutationObserver(sync).observe(document.documentElement, {
        attributes: true,
        attributeFilter: ['class']
    });
})();
</script>
