{{/* Callout shortcode — emits the redesigned .ah-callout markup.
     Backwards-compatible with existing usage: {{< callout title="..." note="..." >}}
     The accent SVG is a generic info icon; swap by overriding `icon=` if needed. */}}
<div class="ah-callout">
    <div class="ah-callout-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
        {{ .Get "title" | default "Note" }}
    </div>
    <p>{{ .Get "note" }}</p>
</div>
