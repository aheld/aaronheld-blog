<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title id="t">System Context — Market Finder Harvestor</title>
  <desc id="d">A C4 system context diagram. The public shopper is at the top and the operator is on the right; both interact with the central Market Finder system, which connects down to a row of external systems along the bottom: market websites, the Philadelphia ArcGIS feed, Firecrawl, Anthropic Claude, and the US Census Geocoder.</desc>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7.5,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <style>
      .title{font-size:19px;font-weight:700;fill:#0f172a}
      .ntitle{font-size:15px;font-weight:700;fill:#ffffff}
      .nsub{font-size:11.5px;font-weight:400;fill:#e2e8f0}
      .ntag{font-size:9.5px;font-weight:600;fill:#dbeafe;letter-spacing:.04em}
      .etitle{font-size:14px;font-weight:700;fill:#0f172a}
      .esub{font-size:11px;font-weight:400;fill:#475569}
      .blabel{font-size:12px;font-weight:600;fill:#64748b;letter-spacing:.02em}
      .alabel{font-size:11.5px;font-weight:500;fill:#475569}
      .leg{font-size:11.5px;font-weight:500;fill:#475569}
    </style>
  </defs>

  <!-- self-contained white panel so the diagram reads on any page theme -->
  <rect x="0" y="0" width="960" height="600" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <text x="480" y="32" text-anchor="middle" class="title">System Context — Market Finder Harvestor</text>

  <!-- legend (top-left) -->
  <rect x="40" y="70" width="13" height="13" rx="2" fill="#1e3a8a"/>
  <text x="59" y="81" class="leg">Actor (person)</text>
  <rect x="40" y="90" width="13" height="13" rx="2" fill="#2563eb"/>
  <text x="59" y="101" class="leg">In-scope system</text>
  <rect x="40" y="110" width="13" height="13" rx="2" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="59" y="121" class="leg">External system</text>

  <!-- arrows -->
  <line x1="480" y1="148" x2="480" y2="246" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="722" y1="296" x2="604" y2="298" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="480" y1="348" x2="480" y2="406" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- arrow labels -->
  <rect x="447" y="188" width="66" height="18" rx="4" fill="#ffffff"/>
  <text x="480" y="201" text-anchor="middle" class="alabel">Browses</text>
  <rect x="606" y="270" width="120" height="18" rx="4" fill="#ffffff"/>
  <text x="666" y="283" text-anchor="middle" class="alabel">Reviews &amp; approves</text>
  <rect x="402" y="368" width="156" height="18" rx="4" fill="#ffffff"/>
  <text x="480" y="381" text-anchor="middle" class="alabel">Scrape · extract · geocode</text>

  <!-- Shopper (top, center) -->
  <circle cx="480" cy="80" r="15" fill="#1e3a8a"/>
  <rect x="388" y="80" width="184" height="66" rx="10" fill="#1e3a8a"/>
  <text x="480" y="110" text-anchor="middle" class="ntitle">Public shopper</text>
  <text x="480" y="130" text-anchor="middle" class="nsub">Browses markets &amp; vendors</text>

  <!-- Market Finder (center, in-scope) -->
  <rect x="360" y="250" width="240" height="98" rx="12" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="480" y="280" text-anchor="middle" class="ntag">[ SOFTWARE SYSTEM ]</text>
  <text x="480" y="302" text-anchor="middle" class="ntitle">Market Finder</text>
  <text x="480" y="322" text-anchor="middle" class="nsub">Markets · vendors · products</text>

  <!-- Operator (right) -->
  <circle cx="812" cy="262" r="15" fill="#1e3a8a"/>
  <rect x="724" y="262" width="176" height="66" rx="10" fill="#1e3a8a"/>
  <text x="812" y="292" text-anchor="middle" class="ntitle">Operator</text>
  <text x="812" y="312" text-anchor="middle" class="nsub">Reviews &amp; approves</text>

  <!-- External systems boundary (bottom) -->
  <rect x="40" y="410" width="880" height="156" rx="12" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="58" y="432" class="blabel">External systems &amp; data sources</text>

  <!-- 5 external boxes -->
  <rect x="60" y="452" width="152" height="92" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3"/>
  <text x="136" y="494" text-anchor="middle" class="etitle">Market websites</text>
  <text x="136" y="515" text-anchor="middle" class="esub">Sites, rosters, PDFs</text>

  <rect x="232" y="452" width="152" height="92" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3"/>
  <text x="308" y="494" text-anchor="middle" class="etitle">Phila ArcGIS</text>
  <text x="308" y="515" text-anchor="middle" class="esub">Market core feed</text>

  <rect x="404" y="452" width="152" height="92" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3"/>
  <text x="480" y="494" text-anchor="middle" class="etitle">Firecrawl</text>
  <text x="480" y="515" text-anchor="middle" class="esub">Pages → markdown</text>

  <rect x="576" y="452" width="152" height="92" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3"/>
  <text x="652" y="494" text-anchor="middle" class="etitle">Anthropic Claude</text>
  <text x="652" y="515" text-anchor="middle" class="esub">Structured extraction</text>

  <rect x="748" y="452" width="152" height="92" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3"/>
  <text x="824" y="494" text-anchor="middle" class="etitle">US Census</text>
  <text x="824" y="515" text-anchor="middle" class="esub">Address → lat/lng</text>
</svg>
