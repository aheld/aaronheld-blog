<svg viewBox="0 0 960 650" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title id="t">Container — Market Finder Harvestor</title>
  <desc id="d">A C4 container diagram. The operator works the deployed Next.js app on the right. On the left, a local laptop runs the harvestor CLI which writes to a git-tracked drop-zone and stages pending reviews into Postgres. The local CLI also calls the external systems collected along the bottom: Firecrawl, Anthropic Claude, US Census, and the Philadelphia ArcGIS feed.</desc>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7.5,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <style>
      .title{font-size:19px;font-weight:700;fill:#0f172a}
      .ntitle{font-size:14.5px;font-weight:700;fill:#ffffff}
      .nsub{font-size:11px;font-weight:400;fill:#e2e8f0}
      .ntag{font-size:9px;font-weight:600;fill:#dbeafe;letter-spacing:.04em}
      .dtitle{font-size:13px;font-weight:700;fill:#ffffff}
      .dsub{font-size:10px;font-weight:400;fill:#e2e8f0}
      .etitle{font-size:13px;font-weight:700;fill:#0f172a}
      .esub{font-size:10.5px;font-weight:400;fill:#475569}
      .blabel{font-size:11.5px;font-weight:700;fill:#64748b;letter-spacing:.03em}
      .alabel{font-size:11px;font-weight:500;fill:#475569}
      .leg{font-size:11px;font-weight:500;fill:#475569}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="650" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="480" y="32" text-anchor="middle" class="title">Container — Market Finder Harvestor</text>

  <!-- legend -->
  <rect x="40" y="50" width="13" height="13" rx="2" fill="#1e3a8a"/><text x="59" y="61" class="leg">Actor</text>
  <rect x="120" y="50" width="13" height="13" rx="2" fill="#2563eb"/><text x="139" y="61" class="leg">Container</text>
  <rect x="222" y="50" width="13" height="13" rx="2" fill="#475569"/><text x="241" y="61" class="leg">Datastore</text>
  <rect x="320" y="50" width="13" height="13" rx="2" fill="#ffffff" stroke="#cbd5e1"/><text x="339" y="61" class="leg">External</text>

  <!-- Operator (top right) -->
  <circle cx="712" cy="84" r="14" fill="#1e3a8a"/>
  <rect x="627" y="84" width="170" height="54" rx="10" fill="#1e3a8a"/>
  <text x="712" y="108" text-anchor="middle" class="ntitle">Operator</text>
  <text x="712" y="125" text-anchor="middle" class="nsub">Reviews &amp; approves</text>

  <!-- arrows (under boxes) -->
  <line x1="712" y1="138" x2="711" y2="201" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="250" y1="287" x2="250" y2="325" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="711" y1="287" x2="711" y2="325" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <polyline points="430,266 525,266 525,360 568,360" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="170" y1="452" x2="170" y2="498" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- Local boundary -->
  <rect x="40" y="160" width="420" height="290" rx="12" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="60" y="184" class="blabel">LOCAL LAPTOP · never deployed</text>

  <!-- harvestor CLI -->
  <rect x="70" y="201" width="360" height="78" rx="10" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="250" y="226" text-anchor="middle" class="ntag">[ CONTAINER · Node + tsx ]</text>
  <text x="250" y="246" text-anchor="middle" class="ntitle">harvestor CLI</text>
  <text x="250" y="265" text-anchor="middle" class="nsub">scrape · extract · enrich · load</text>

  <!-- Drop-zone datastore -->
  <path d="M110,336 L110,409 A140,11 0 0 0 390,409 L390,336 Z" fill="#475569" stroke="#334155"/>
  <ellipse cx="250" cy="336" rx="140" ry="11" fill="#5b6b80" stroke="#334155"/>
  <text x="250" y="372" text-anchor="middle" class="dtitle">Drop-zone</text>
  <text x="250" y="390" text-anchor="middle" class="dsub">Git-tracked JSON · replay boundary</text>

  <!-- Deployed boundary -->
  <rect x="500" y="160" width="420" height="290" rx="12" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="520" y="184" class="blabel">DEPLOYED · Vercel + Neon</text>

  <!-- Next.js app -->
  <rect x="530" y="201" width="360" height="78" rx="10" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="710" y="226" text-anchor="middle" class="ntag">[ CONTAINER · Next 15 ]</text>
  <text x="710" y="246" text-anchor="middle" class="ntitle">Next.js app</text>
  <text x="710" y="265" text-anchor="middle" class="nsub">Public site · /admin review · quality</text>

  <!-- Postgres datastore -->
  <path d="M571,336 L571,409 A140,11 0 0 0 851,409 L851,336 Z" fill="#475569" stroke="#334155"/>
  <ellipse cx="711" cy="336" rx="140" ry="11" fill="#5b6b80" stroke="#334155"/>
  <text x="711" y="372" text-anchor="middle" class="dtitle">Postgres + PostGIS</text>
  <text x="711" y="390" text-anchor="middle" class="dsub">markets · vendors · extraction_reviews</text>

  <!-- arrow labels -->
  <rect x="648" y="160" width="128" height="17" rx="4" fill="#ffffff"/><text x="712" y="172" text-anchor="middle" class="alabel">Works the diff queue</text>
  <rect x="190" y="298" width="120" height="17" rx="4" fill="#ffffff"/><text x="250" y="310" text-anchor="middle" class="alabel">writes JSON files</text>
  <rect x="600" y="298" width="222" height="17" rx="4" fill="#ffffff"/><text x="711" y="310" text-anchor="middle" class="alabel">apply on approve · sticky-merged</text>
  <rect x="455" y="340" width="140" height="17" rx="4" fill="#ffffff"/><text x="525" y="352" text-anchor="middle" class="alabel">stage pending reviews</text>

  <!-- External boundary (bottom) -->
  <rect x="40" y="480" width="880" height="150" rx="12" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="60" y="503" class="blabel">EXTERNAL SYSTEMS &amp; DATA SOURCES</text>
  <rect x="75" y="461" width="192" height="17" rx="4" fill="#ffffff"/><text x="171" y="473" text-anchor="middle" class="alabel">scrape · extract · geocode · feed</text>

  <rect x="60" y="520" width="180" height="92" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3"/>
  <text x="150" y="562" text-anchor="middle" class="etitle">Firecrawl</text>
  <text x="150" y="583" text-anchor="middle" class="esub">Scrape + discovery</text>

  <rect x="280" y="520" width="180" height="92" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3"/>
  <text x="370" y="562" text-anchor="middle" class="etitle">Anthropic Claude</text>
  <text x="370" y="583" text-anchor="middle" class="esub">Tool-use extraction</text>

  <rect x="500" y="520" width="180" height="92" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3"/>
  <text x="590" y="562" text-anchor="middle" class="etitle">US Census</text>
  <text x="590" y="583" text-anchor="middle" class="esub">Geocode addresses</text>

  <rect x="720" y="520" width="180" height="92" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3"/>
  <text x="810" y="562" text-anchor="middle" class="etitle">Phila ArcGIS</text>
  <text x="810" y="583" text-anchor="middle" class="esub">Market core feed</text>
</svg>
