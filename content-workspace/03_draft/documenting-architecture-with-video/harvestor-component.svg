<svg viewBox="0 0 960 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title id="t">Component — harvestor CLI internals</title>
  <desc id="d">A C4 component diagram of the harvestor CLI. cli.ts dispatches to a four-stage pipeline: scrape, extract, enrich, load. The stages call external services (Firecrawl, Claude, US Census) at the top, read and write the git-tracked drop-zone, and rest on a shared lib. The load stage hands off through adapter/review into Postgres extraction_reviews, and a read-only metrics component scores quality.</desc>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7.5,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="ah2" markerWidth="10" markerHeight="10" refX="1" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M7.5,0 L0,3 L7.5,6 Z" fill="#64748b"/>
    </marker>
    <style>
      .title{font-size:19px;font-weight:700;fill:#0f172a}
      .ctitle{font-size:13.5px;font-weight:700;fill:#0f172a}
      .csub{font-size:10px;font-weight:400;fill:#475569}
      .ctag{font-size:8.5px;font-weight:600;fill:#2563eb;letter-spacing:.04em}
      .dtitle{font-size:13px;font-weight:700;fill:#ffffff}
      .dsub{font-size:9.5px;font-weight:400;fill:#e2e8f0}
      .etitle{font-size:12.5px;font-weight:700;fill:#0f172a}
      .esub{font-size:10px;font-weight:400;fill:#475569}
      .blabel{font-size:11.5px;font-weight:700;fill:#64748b;letter-spacing:.03em}
      .alabel{font-size:10.5px;font-weight:500;fill:#475569}
      .leg{font-size:11px;font-weight:500;fill:#475569}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="720" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="480" y="30" text-anchor="middle" class="title">Component — harvestor CLI internals</text>

  <!-- legend -->
  <rect x="40" y="48" width="13" height="13" rx="2" fill="#eff6ff" stroke="#93c5fd"/><text x="59" y="59" class="leg">Component</text>
  <rect x="150" y="48" width="13" height="13" rx="2" fill="#475569"/><text x="169" y="59" class="leg">Datastore</text>
  <rect x="250" y="48" width="13" height="13" rx="2" fill="#ffffff" stroke="#cbd5e1"/><text x="269" y="59" class="leg">External</text>

  <!-- diagonal "uses external" arrows (under boxes) -->
  <line x1="190" y1="288" x2="240" y2="139" stroke="#64748b" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="360" y1="288" x2="470" y2="139" stroke="#64748b" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="395" y1="288" x2="675" y2="139" stroke="#64748b" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- External services boundary -->
  <rect x="40" y="66" width="880" height="80" rx="12" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="60" y="86" class="blabel">EXTERNAL SERVICES</text>
  <rect x="150" y="94" width="200" height="44" rx="9" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3"/><text x="250" y="121" text-anchor="middle" class="etitle">Firecrawl</text>
  <rect x="380" y="94" width="200" height="44" rx="9" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3"/><text x="480" y="121" text-anchor="middle" class="etitle">Anthropic Claude</text>
  <rect x="610" y="94" width="200" height="44" rx="9" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3"/><text x="710" y="121" text-anchor="middle" class="etitle">US Census</text>

  <!-- CLI boundary -->
  <rect x="40" y="172" width="880" height="500" rx="12" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="60" y="196" class="blabel">HARVESTOR CLI · Node + tsx</text>

  <!-- cli.ts -->
  <rect x="380" y="210" width="200" height="52" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.4"/>
  <text x="480" y="230" text-anchor="middle" class="ctag">[ ENTRYPOINT ]</text>
  <text x="480" y="247" text-anchor="middle" class="ctitle">cli.ts</text>
  <text x="480" y="259" text-anchor="middle" class="csub">arg parse · dispatch</text>

  <!-- dispatch elbow to spine -->
  <polyline points="480,262 480,276 160,276 160,288" fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#ah)"/>
  <rect x="285" y="268" width="70" height="16" rx="4" fill="#ffffff"/><text x="320" y="280" text-anchor="middle" class="alabel">dispatch</text>

  <!-- pipeline spine -->
  <rect x="70" y="288" width="180" height="72" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.4"/>
  <text x="160" y="322" text-anchor="middle" class="ctitle">stages/scrape</text>
  <text x="160" y="340" text-anchor="middle" class="csub">Firecrawl → markdown</text>

  <rect x="270" y="288" width="180" height="72" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.4"/>
  <text x="360" y="322" text-anchor="middle" class="ctitle">stages/extract</text>
  <text x="360" y="340" text-anchor="middle" class="csub">Claude + geocode</text>

  <rect x="470" y="288" width="180" height="72" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.4"/>
  <text x="560" y="322" text-anchor="middle" class="ctitle">stages/enrich</text>
  <text x="560" y="340" text-anchor="middle" class="csub">vendor detail pages</text>

  <rect x="670" y="288" width="180" height="72" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.4"/>
  <text x="760" y="322" text-anchor="middle" class="ctitle">stages/load</text>
  <text x="760" y="340" text-anchor="middle" class="csub">dedup · diff · stage</text>

  <line x1="250" y1="324" x2="270" y2="324" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="450" y1="324" x2="470" y2="324" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="650" y1="324" x2="670" y2="324" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- spine to drop-zone (double arrow) -->
  <line x1="340" y1="360" x2="312" y2="398" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)" marker-start="url(#ah2)"/>
  <rect x="330" y="368" width="118" height="16" rx="4" fill="#ffffff"/><text x="389" y="380" text-anchor="middle" class="alabel">JSON in/out · replay</text>

  <!-- Drop-zone datastore -->
  <path d="M85,402 L85,471 A215,11 0 0 0 515,471 L515,402 Z" fill="#475569" stroke="#334155"/>
  <ellipse cx="300" cy="402" rx="215" ry="11" fill="#5b6b80" stroke="#334155"/>
  <text x="300" y="438" text-anchor="middle" class="dtitle">Drop-zone</text>
  <text x="300" y="455" text-anchor="middle" class="dsub">git-tracked JSON · replay boundary</text>

  <!-- adapter/review -->
  <rect x="672" y="398" width="210" height="58" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.4"/>
  <text x="777" y="424" text-anchor="middle" class="ctitle">adapter/review</text>
  <text x="777" y="441" text-anchor="middle" class="csub">the only app bridge</text>
  <line x1="760" y1="360" x2="775" y2="396" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- lib foundation strip -->
  <rect x="70" y="512" width="560" height="58" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.4"/>
  <text x="350" y="536" text-anchor="middle" class="ctitle">lib/*  ·  shared by all stages</text>
  <text x="350" y="554" text-anchor="middle" class="csub">tools (zod→tool schema) · source-id · run-id · geocode · dedup</text>

  <!-- Postgres datastore -->
  <path d="M658,502 L658,571 A120,11 0 0 0 898,571 L898,502 Z" fill="#475569" stroke="#334155"/>
  <ellipse cx="778" cy="502" rx="120" ry="11" fill="#5b6b80" stroke="#334155"/>
  <text x="778" y="536" text-anchor="middle" class="dtitle">Postgres</text>
  <text x="778" y="553" text-anchor="middle" class="dsub">extraction_reviews</text>
  <line x1="777" y1="456" x2="778" y2="490" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>
  <rect x="713" y="464" width="132" height="16" rx="4" fill="#ffffff"/><text x="779" y="476" text-anchor="middle" class="alabel">stage pending reviews</text>

  <!-- metrics -->
  <rect x="664" y="600" width="230" height="50" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.4"/>
  <text x="779" y="621" text-anchor="middle" class="ctitle">queries/extraction-metrics</text>
  <text x="779" y="638" text-anchor="middle" class="csub">read-only quality scoring</text>
  <line x1="779" y1="600" x2="778" y2="582" stroke="#64748b" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ah)"/>
</svg>
